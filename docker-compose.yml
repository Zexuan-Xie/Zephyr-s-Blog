services:
  db:
    image: pgvector/pgvector:0.8.2-pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xlab_blog}
      POSTGRES_USER: ${POSTGRES_USER:-xlab_blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://xlab_blog:change-me-postgres-password@db:5432/xlab_blog?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-change-me-minimum-32-bytes}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-admin-password}
      ASSET_UPLOAD_DIR: ${ASSET_UPLOAD_DIR:-/app/uploads}
      ASSET_PUBLIC_BASE_URL: ${ASSET_PUBLIC_BASE_URL:-/api/assets}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-qwen}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - uploads:/app/uploads

  web:
    build:
      context: ./web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    expose:
      - "4173"

  caddy:
    image: caddy:2.11.3-alpine
    depends_on:
      - api
      - web
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:
