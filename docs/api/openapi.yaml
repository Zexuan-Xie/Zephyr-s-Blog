openapi: 3.2.0
info:
  title: xLab Personal Blog API
  version: 0.1.0
  summary: Unix-like content tree blog API
  description: >-
    API contract for a single-author full-stack blog organized as a Unix-like
    content tree. Public content is modeled as Directory/File Nodes; FileContent
    supports Markdown articles and sandboxed full HTML documents. Search uses
    PostgreSQL full-text retrieval plus Qwen/DashScope text-embedding-v4 semantic
    retrieval fused with RRF.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Public Tree
  - name: Search
  - name: Comments
  - name: Likes
  - name: Assets
  - name: Admin Tree
  - name: Admin Versions
  - name: Admin Preview
  - name: Admin Search
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a reader account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Reader account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid JSON, email, or password
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalidJSON:
                  value: { error: invalid JSON body }
                invalidEmail:
                  value: { error: invalid email }
                invalidPassword:
                  value: { error: password must be at least 8 characters }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid JSON body
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: invalid JSON body }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalServerError' }
  /auth/me:
    get:
      tags: [Auth]
      summary: Return the current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /tree/resolve:
    get:
      tags: [Public Tree]
      summary: Resolve a public content-tree path
      description: >-
        Resolve the current tree first. If not found, look up path_redirects and
        return a redirect response for the SPA to navigate with replace=true.
      security: []
      parameters:
        - $ref: '#/components/parameters/PathQuery'
      responses:
        '200':
          description: Directory, file, or redirect resolution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreeResolveResponse'
        '404': { $ref: '#/components/responses/NotFound' }
  /tree:
    get:
      tags: [Public Tree]
      summary: Return root directory children
      security: []
      responses:
        '200':
          description: Root directory page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryPage'
  /tree/{node_id}/children:
    get:
      tags: [Public Tree]
      summary: Return published children for a directory node
      security: []
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: Directory children
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryPage'
        '404': { $ref: '#/components/responses/NotFound' }
  /recent:
    get:
      tags: [Public Tree]
      summary: Return recently updated published files
      security: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Recent files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileEntryList'

  /search:
    get:
      tags: [Search]
      summary: Hybrid search over published files
      description: >-
        Search File.name, PublishedContent.keywords, published search_text, and path.
        Draft autosaves are excluded until Publish copies Current Content into
        the independent Published Content snapshot. Ranking combines full-text
        retrieval and Qwen/DashScope embedding
        semantic retrieval with Reciprocal Rank Fusion. No LLM query expansion or
        reranking is performed in this release.
      security: []
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 1 }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

  /files/{file_id}/comments:
    get:
      tags: [Comments]
      summary: Return public comment thread for a file
      security: []
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Two-level comment thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentThread'
    post:
      tags: [Comments]
      summary: Create a top-level comment or reply
      parameters:
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401': { $ref: '#/components/responses/Unauthorized' }
  /comments/{comment_id}:
    delete:
      tags: [Comments]
      summary: Soft-delete a comment or reply
      parameters:
        - $ref: '#/components/parameters/CommentId'
      responses:
        '204': { description: Comment soft-deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /files/{file_id}/like:
    put:
      tags: [Likes]
      summary: Like a file idempotently
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Like state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeState'
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [Likes]
      summary: Unlike a file idempotently
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Like state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeState'
  /comments/{comment_id}/like:
    put:
      tags: [Likes]
      summary: Like a comment idempotently
      parameters:
        - $ref: '#/components/parameters/CommentId'
      responses:
        '200':
          description: Like state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeState'
    delete:
      tags: [Likes]
      summary: Unlike a comment idempotently
      parameters:
        - $ref: '#/components/parameters/CommentId'
      responses:
        '200':
          description: Like state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeState'

  /assets/{asset_id}/{filename}:
    get:
      tags: [Assets]
      summary: Return an immutable published file asset
      description: >-
        Published assets are immutable and may be served with
        Cache-Control: public, max-age=31536000, immutable. Draft assets require
        admin access through admin endpoints, not this public route.
      security: []
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: "Asset bytes. PDF assets may be returned with Content-Disposition: inline but are not auto-embedded by the blog shell."
          headers:
            Cache-Control:
              schema: { type: string }
              example: public, max-age=31536000, immutable
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/tree:
    get:
      tags: [Admin Tree]
      summary: Return the complete protected Author Workspace content tree
      description: >-
        Admin-only Author Workspace tree. The response is a flat pre-order list
        with parent_id links so the client can restore expansion/selection
        state. It includes every Directory and File, including Draft Files,
        Published Files, and Files with unpublished Current Content. Public
        tree/search/recent APIs read only Published Content snapshots.
      responses:
        '200':
          description: Complete protected tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTreeResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/nodes:
    post:
      tags: [Admin Tree]
      summary: Create a directory or file node
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodeRequest'
      responses:
        '201':
          description: Node created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminNodeDetail'
        '400':
          description: Invalid JSON or invalid node fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              examples:
                invalidName:
                  value: { error: Node name is required. }
                invalidSlug:
                  value: { error: Node slug is required. }
                invalidKind:
                  value: { error: Node kind must be directory or file. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A sibling node already uses the requested slug
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example: { error: A node with this slug already exists under the selected parent. }
  /admin/nodes/{node_id}:
    get:
      tags: [Admin Tree]
      summary: Return Author Workspace node detail, including draft data
      description: >-
        Directory responses include overview fields and immediate children;
        File responses include draft content/settings/assets metadata needed by
        the Stage 2 workspace. Public APIs do not expose Draft Files.
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '200':
          description: Admin node detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminNodeDetail'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Admin Tree]
      summary: Explicitly update node settings
      description: >-
        Updates Author settings such as name and explicit url_path segment.
        Explicit URL Path edits are never silently rewritten: validation errors,
        reserved root segments, and sibling conflicts return machine-readable
        errors. Directory movement uses the move preview/commit endpoints.
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNodeRequest'
      responses:
        '200':
          description: Node updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminNodeDetail'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Admin Tree]
      summary: Delete an empty draft Directory or draft File
      description: >-
        Stage 2 blocks every non-empty Directory, including draft-only subtrees,
        and blocks Published Files. Recursive subtree deletion is not available.
        Conflict responses include machine-readable reason values.
      parameters:
        - $ref: '#/components/parameters/NodeId'
      responses:
        '204': { description: Empty draft node deleted }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/nodes/{parent_id}/children/order:
    put:
      tags: [Admin Tree]
      summary: Reorder same-parent child nodes transactionally
      description: >-
        Accepts the complete ordered child id list for one parent only. The
        server verifies every child currently belongs to parent_id, rejects any
        reparent attempt, and uses expected_version as a lost-update guard.
      parameters:
        - name: parent_id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderChildrenRequest'
      responses:
        '200':
          description: Children reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderChildrenResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/nodes/{node_id}/move-preview:
    post:
      tags: [Admin Tree]
      summary: Preview moving a node to another Directory
      description: >-
        Returns destination path, affected published File descendant paths,
        redirects that would be created for formerly public File paths, subtree
        rewrite impact, and machine-readable blocked reasons. Directory paths
        themselves are not public redirect targets unless published File
        descendants are affected.
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveNodeRequest'
      responses:
        '200':
          description: Move preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovePreviewResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/nodes/{node_id}/move:
    post:
      tags: [Admin Tree]
      summary: Commit a previously previewed Directory Picker move
      parameters:
        - $ref: '#/components/parameters/NodeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveNodeRequest'
      responses:
        '200':
          description: Node moved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminNodeDetail'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/files/{file_id}/content:
    get:
      tags: [Admin Tree, Admin Versions]
      summary: Return Current, Previous, and Published Content metadata
      description: >-
        Admin-only version state for the Author Workspace. Current Content is
        the autosaved editable draft; Previous Content is the single reversible
        pre-save slot; Published Content is the stable public snapshot used by
        public pages, recent lists, comments/likes existence checks, and search.
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Version state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionState'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Admin Tree, Admin Versions]
      summary: Save Current Content with optimistic concurrency
      description: >-
        Autosave endpoint for Current Content. Clients must send
        expected_revision from the latest Current Content. A changed save rotates
        the pre-save Current snapshot into Previous, increments revision, updates
        last_saved_at, refreshes search_text, and marks embedding_status
        pending/failed/ready depending on embedding refresh outcome. A no-op save
        returns the current version without rotating Previous or incrementing
        revision. Published Content and public search remain unchanged until
        Publish.
      parameters:
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileContentRequest'
      responses:
        '200':
          description: Current Content saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileContent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Revision conflict; client must reload or copy local changes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
              example:
                error: revision conflict
                details: { reason: revision_conflict, current_revision: 7 }
  /admin/files/{file_id}/previous/restore:
    post:
      tags: [Admin Versions]
      summary: Restore Previous Content into Current Content
      description: >-
        Swaps Current and Previous snapshots, increments Current revision, and
        leaves Published Content unchanged until Publish.
      parameters:
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestorePreviousRequest'
      responses:
        '200':
          description: Current and Previous swapped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionState'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/files/{file_id}/publish-summary:
    get:
      tags: [Admin Tree, Admin Versions, Assets]
      summary: Preview content and asset changes that Publish will promote
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Publish summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishSummary'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/files/{file_id}/publish:
    post:
      tags: [Admin Tree, Admin Versions, Assets]
      summary: Publish Current Content as an independent public snapshot
      description: >-
        Copies Current Content into Published Content, records source_revision,
        promotes the draft asset set into Published Assets, and updates public
        visibility atomically. Public pages/search/recent change only after this
        endpoint succeeds.
      parameters:
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishFileRequest'
      responses:
        '200':
          description: File published from Current Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/files/{file_id}/unpublish:
    post:
      tags: [Admin Tree, Admin Versions]
      summary: Hide a file from public routes while retaining Published Content
      description: >-
        Removes public visibility from tree/search/recent/asset serving while
        retaining the last Published Content snapshot and metadata for comparison
        or later republish. Current and Previous Content are not overwritten.
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: File hidden from public routes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionState'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/preview/{file_id}:
    get:
      tags: [Admin Preview]
      summary: Render Draft Preview from saved Current Content
      description: >-
        Author-only preview of the latest saved Current Content with draft asset
        URLs. Anonymous users and Reader accounts must receive 401/403 and must
        not learn draft content or draft asset metadata. HTML document previews
        must continue to use an iframe sandbox without allow-same-origin.
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Draft preview payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftPreview'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/files/{file_id}/assets:
    get:
      tags: [Admin Tree, Assets]
      summary: List draft and published asset states for a file
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Draft and Published asset state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAssetState'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Admin Tree, Assets]
      summary: Upload a draft asset for Current Content (MIME allowlist includes images, PDF, CSS/JS, JSON/text/CSV)
      description: >-
        Uploads are draft-only until Publish promotes the draft asset set. Public
        /assets routes serve only Published Assets from the last successful
        Publish.
      parameters:
        - $ref: '#/components/parameters/FileId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Draft asset uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileAsset'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /admin/assets/{asset_id}:
    delete:
      tags: [Admin Tree, Assets]
      summary: Delete or detach a draft asset
      description: >-
        Deleting a draft-only asset removes it. Detaching an asset that still
        exists in Published Assets must not break current public content before
        the next Publish or Unpublish.
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '204': { description: Draft asset deleted or detached }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /admin/assets/{asset_id}/{filename}:
    get:
      tags: [Admin Tree, Assets]
      summary: Return draft asset bytes for Author preview
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - name: filename
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Draft asset bytes for authenticated Author only
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/files/{file_id}/refresh-embedding:
    post:
      tags: [Admin Search]
      summary: Refresh Qwen embedding for one file
      description: >-
        Uses the configured EmbeddingProvider. Current first implementation is
        Qwen/DashScope text-embedding-v4 with 1024 dimensions. Failure must not
        block file saving; it sets embedding_status=failed and preserves
        full-text search.
      parameters:
        - $ref: '#/components/parameters/FileId'
      responses:
        '202':
          description: Embedding refresh accepted or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingState'
  /admin/search-index/rebuild:
    post:
      tags: [Admin Search]
      summary: Rebuild search_text, tsvector, and embeddings
      responses:
        '202':
          description: Rebuild accepted
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [accepted] }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    NodeId:
      name: node_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    FileId:
      name: file_id
      in: path
      required: true
      description: Node id whose kind is file
      schema: { type: string, format: uuid }
    CommentId:
      name: comment_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    AssetId:
      name: asset_id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PathQuery:
      name: path
      in: query
      required: true
      schema:
        type: string
        pattern: '^/.*'
      example: /research-notes/go-auth-practice
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Offset:
      name: offset
      in: query
      required: false
      schema: { type: integer, minimum: 0, default: 0 }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        details: { type: object, additionalProperties: true }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        display_name: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      required: [id, email, role, provider, created_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        display_name: { type: string }
        role: { type: string, enum: [admin, reader] }
        provider: { type: string, enum: [local, github] }
        created_at: { type: string, format: date-time }

    NodeKind:
      type: string
      enum: [directory, file]
    ContentFormat:
      type: string
      enum: [markdown, html_document]
    PublishStatus:
      type: string
      enum: [draft, published, unpublished_changes]
      description: >-
        Public FileEntry responses expose published only. Admin tree responses
        use unpublished_changes when Current revision differs from the Published
        Content source_revision.
    EmbeddingStatus:
      type: string
      enum: [pending, ready, failed]
    Node:
      type: object
      required: [id, kind, name, slug, path, sort_order, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        parent_id: { type: [string, 'null'], format: uuid }
        kind: { $ref: '#/components/schemas/NodeKind' }
        name: { type: string }
        slug: { type: string }
        path: { type: string, example: /research-notes/go-auth-practice }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DirectoryEntry:
      type: object
      required: [node, child_directory_count, child_file_count]
      properties:
        node: { $ref: '#/components/schemas/Node' }
        child_directory_count: { type: integer, minimum: 0 }
        child_file_count: { type: integer, minimum: 0 }
    FileEntry:
      type: object
      required: [node, content_format, status, keywords, like_count, comment_count]
      properties:
        node: { $ref: '#/components/schemas/Node' }
        content_format: { $ref: '#/components/schemas/ContentFormat' }
        status: { $ref: '#/components/schemas/PublishStatus' }
        keywords:
          type: array
          items: { type: string }
        published_at: { type: [string, 'null'], format: date-time }
        like_count: { type: integer, minimum: 0 }
        comment_count: { type: integer, minimum: 0 }
        reading_time_minutes: { type: [integer, 'null'], minimum: 1 }
    FileContent:
      type: object
      required: [node_id, revision, content_format, keywords, body_raw, search_text, status, last_saved_at, embedding_status]
      properties:
        node_id: { type: string, format: uuid }
        revision:
          type: integer
          minimum: 1
          description: Monotonic Current Content revision used for optimistic concurrency.
        content_format: { $ref: '#/components/schemas/ContentFormat' }
        keywords:
          type: array
          items: { type: string }
          maxItems: 50
        body_raw: { type: string }
        body_html:
          type: [string, 'null']
          description: Sanitized Markdown HTML cache; null or unused for html_document.
        search_text: { type: string }
        status: { $ref: '#/components/schemas/PublishStatus' }
        published_at:
          type: [string, 'null']
          format: date-time
          deprecated: true
          description: Use PublishedContent.published_at for the stable public snapshot.
        last_saved_at: { type: string, format: date-time }
        embedding: false
        embedding_model: { type: [string, 'null'], example: text-embedding-v4 }
        embedding_status: { $ref: '#/components/schemas/EmbeddingStatus' }
        embedding_error: { type: [string, 'null'] }
        embedding_updated_at: { type: [string, 'null'], format: date-time }
    FilePage:
      type: object
      required: [node, content, keywords_public, like_count, comment_count, assets]
      properties:
        node: { $ref: '#/components/schemas/Node' }
        content: { $ref: '#/components/schemas/FileContent' }
        keywords_public:
          type: array
          maxItems: 3
          items: { type: string }
        like_count: { type: integer, minimum: 0 }
        viewer_has_liked: { type: boolean }
        comment_count: { type: integer, minimum: 0 }
        assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
    DirectoryPage:
      type: object
      required: [node, entries]
      properties:
        node:
          anyOf:
            - $ref: '#/components/schemas/Node'
            - type: 'null'
          description: Null for synthetic root directory.
        path: { type: string, example: / }
        entries:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/DirectoryEntry'
              - $ref: '#/components/schemas/FileEntry'
    FileEntryList:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/FileEntry' }
        limit: { type: integer }
        offset: { type: integer }
    TreeResolveResponse:
      oneOf:
        - type: object
          required: [type, directory]
          properties:
            type: { type: string, const: directory }
            directory: { $ref: '#/components/schemas/DirectoryPage' }
        - type: object
          required: [type, file]
          properties:
            type: { type: string, const: file }
            file: { $ref: '#/components/schemas/FilePage' }
        - type: object
          required: [type, new_path]
          properties:
            type: { type: string, const: redirect }
            new_path: { type: string }
    SearchResponse:
      type: object
      required: [query, items]
      properties:
        query: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/SearchResult' }
    SearchResult:
      type: object
      required: [file, path, snippet, score, match_sources]
      properties:
        file: { $ref: '#/components/schemas/FileEntry' }
        path: { type: string }
        snippet: { type: string }
        score: { type: number, format: double }
        match_sources:
          type: array
          items: { type: string, enum: [text, semantic, keyword] }

    CommentThread:
      type: object
      required: [file_id, comments]
      properties:
        file_id: { type: string, format: uuid }
        comments:
          type: array
          items: { $ref: '#/components/schemas/Comment' }
    Comment:
      type: object
      required: [id, file_node_id, user, body, created_at, replies, like_count, deleted]
      properties:
        id: { type: string, format: uuid }
        file_node_id: { type: string, format: uuid }
        parent_id: { type: [string, 'null'], format: uuid }
        reply_to_user_id: { type: [string, 'null'], format: uuid }
        user: { $ref: '#/components/schemas/PublicUser' }
        body: { type: string, description: Plain text; escaped by clients. }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        deleted_at: { type: [string, 'null'], format: date-time }
        deleted: { type: boolean }
        like_count: { type: integer, minimum: 0 }
        viewer_has_liked: { type: boolean }
        replies:
          type: array
          items: { $ref: '#/components/schemas/CommentReply' }
    CommentReply:
      allOf:
        - $ref: '#/components/schemas/CommentBase'
    CommentBase:
      type: object
      required: [id, file_node_id, parent_id, user, body, created_at, deleted, like_count]
      properties:
        id: { type: string, format: uuid }
        file_node_id: { type: string, format: uuid }
        parent_id: { type: string, format: uuid }
        reply_to_user_id: { type: [string, 'null'], format: uuid }
        user: { $ref: '#/components/schemas/PublicUser' }
        body: { type: string }
        created_at: { type: string, format: date-time }
        deleted: { type: boolean }
        like_count: { type: integer, minimum: 0 }
    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 5000 }
        parent_id:
          type: [string, 'null']
          format: uuid
          description: Top-level parent comment id. Replies to replies are normalized to the top-level parent.
        reply_to_user_id: { type: [string, 'null'], format: uuid }
    PublicUser:
      type: object
      required: [id, display_name]
      properties:
        id: { type: string, format: uuid }
        display_name: { type: string }
    LikeState:
      type: object
      required: [liked, like_count]
      properties:
        liked: { type: boolean }
        like_count: { type: integer, minimum: 0 }

    FileAsset:
      type: object
      required: [id, file_node_id, filename, mime_type, size_bytes, storage_provider, public_url, state, created_at]
      properties:
        id: { type: string, format: uuid }
        file_node_id: { type: string, format: uuid }
        filename: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer, minimum: 0 }
        storage_provider: { type: string, enum: [local, s3, r2, oss] }
        storage_key: { type: string }
        public_url: { type: string }
        state:
          type: string
          enum: [draft, published, draft_and_published]
        published_asset_id: { type: [string, 'null'], format: uuid }
        created_at: { type: string, format: date-time }

    PublishedContent:
      type: object
      required: [node_id, source_revision, content_format, keywords, body_raw, search_text, published_at, visible]
      properties:
        node_id: { type: string, format: uuid }
        source_revision: { type: integer, minimum: 1 }
        content_format: { $ref: '#/components/schemas/ContentFormat' }
        keywords:
          type: array
          items: { type: string }
        body_raw: { type: string }
        body_html: { type: [string, 'null'] }
        search_text: { type: string }
        published_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        visible:
          type: boolean
          description: False after Unpublish; snapshot is retained but hidden from public routes.
    PreviousContent:
      allOf:
        - $ref: '#/components/schemas/FileContent'
      description: Single pre-save slot for reversible Current/Previous restore.
    FileVersionState:
      type: object
      required: [current, has_unpublished_changes, draft_assets, published_assets]
      properties:
        current: { $ref: '#/components/schemas/FileContent' }
        previous:
          anyOf:
            - $ref: '#/components/schemas/PreviousContent'
            - type: 'null'
        published:
          anyOf:
            - $ref: '#/components/schemas/PublishedContent'
            - type: 'null'
        has_unpublished_changes: { type: boolean }
        draft_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
        published_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
    RestorePreviousRequest:
      type: object
      required: [expected_revision]
      properties:
        expected_revision: { type: integer, minimum: 1 }
    PublishFileRequest:
      type: object
      required: [expected_revision]
      properties:
        expected_revision: { type: integer, minimum: 1 }
    PublishSummary:
      type: object
      required: [file_id, current_revision, will_update_content, draft_assets, published_assets, asset_changes]
      properties:
        file_id: { type: string, format: uuid }
        current_revision: { type: integer, minimum: 1 }
        published_source_revision: { type: [integer, 'null'], minimum: 1 }
        will_update_content: { type: boolean }
        draft_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
        published_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
        asset_changes:
          type: array
          items:
            type: object
            required: [filename, change]
            properties:
              filename: { type: string }
              change: { type: string, enum: [added, removed, changed, unchanged] }
    PublishResult:
      type: object
      required: [current, published, promoted_assets]
      properties:
        current: { $ref: '#/components/schemas/FileContent' }
        published: { $ref: '#/components/schemas/PublishedContent' }
        promoted_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
    FileAssetState:
      type: object
      required: [draft_assets, published_assets]
      properties:
        draft_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
        published_assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
    DraftPreview:
      type: object
      required: [node, current, html, assets, iframe_sandbox]
      properties:
        node: { $ref: '#/components/schemas/Node' }
        current: { $ref: '#/components/schemas/FileContent' }
        html:
          type: string
          description: Rendered Markdown HTML or safe wrapper metadata for html_document.
        assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
        iframe_sandbox:
          type: string
          example: allow-scripts
          description: Must not include allow-same-origin.

    CreateNodeRequest:
      type: object
      required: [kind, name]
      properties:
        parent_id:
          type: [string, 'null']
          format: uuid
          description: Selected parent Directory; null creates under the root.
        kind: { $ref: '#/components/schemas/NodeKind' }
        name: { type: string, minLength: 1 }
        content_format:
          $ref: '#/components/schemas/ContentFormat'
      description: >-
        Stage 2 minimal create request. Clients do not send slug, sort_order,
        or raw ids in primary UI; backend generates the URL Path segment,
        preserving Chinese characters, normalizing Latin text, and suffixing
        initial conflicts.
    UpdateNodeRequest:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        url_path:
          type: string
          description: Explicit Author-edited URL Path segment or absolute path; never silently rewritten.
    UpdateFileContentRequest:
      type: object
      required: [expected_revision, content_format, body_raw, keywords]
      properties:
        expected_revision:
          type: integer
          minimum: 1
          description: Latest Current Content revision observed by the client.
        content_format: { $ref: '#/components/schemas/ContentFormat' }
        body_raw: { type: string }
        keywords:
          type: array
          items: { type: string }
          default: []
    AdminNodeDetail:
      type: object
      required: [node]
      properties:
        node: { $ref: '#/components/schemas/Node' }
        content:
          anyOf:
            - $ref: '#/components/schemas/FileContent'
            - type: 'null'
        assets:
          type: array
          items: { $ref: '#/components/schemas/FileAsset' }
        redirects_created:
          type: array
          items: { $ref: '#/components/schemas/PathRedirect' }
    AdminTreeNode:
      type: object
      required: [id, parent_id, kind, name, url_path, sort_order, status]
      properties:
        id: { type: string, format: uuid }
        parent_id: { type: [string, 'null'], format: uuid }
        kind: { $ref: '#/components/schemas/NodeKind' }
        name: { type: string }
        url_path: { type: string, example: /研究/笔记 }
        sort_order: { type: integer }
        status:
          $ref: '#/components/schemas/PublishStatus'
        current_revision: { type: [integer, 'null'], minimum: 1 }
        published_source_revision: { type: [integer, 'null'], minimum: 1 }
        content_format:
          anyOf:
            - $ref: '#/components/schemas/ContentFormat'
            - type: 'null'
    AdminTreeResponse:
      type: object
      required: [nodes]
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/AdminTreeNode' }
    ReorderChildrenRequest:
      type: object
      required: [child_ids, expected_version]
      properties:
        child_ids:
          type: array
          items: { type: string, format: uuid }
        expected_version:
          type: integer
          minimum: 0
          description: Lost-update guard supplied from the latest tree/detail response.
    ReorderChildrenResponse:
      type: object
      required: [parent_id, child_ids, version]
      properties:
        parent_id: { type: string, format: uuid }
        child_ids:
          type: array
          items: { type: string, format: uuid }
        version: { type: integer, minimum: 0 }
    MoveNodeRequest:
      type: object
      required: [new_parent_id, expected_version]
      properties:
        new_parent_id:
          type: [string, 'null']
          format: uuid
          description: Destination Directory; null means root.
        expected_version: { type: integer, minimum: 0 }
    MovePreviewResponse:
      type: object
      required: [node_id, destination_path, affected_paths, redirects, blocked_reasons]
      properties:
        node_id: { type: string, format: uuid }
        destination_path: { type: string }
        affected_paths:
          type: array
          items: { type: string }
        redirects:
          type: array
          items: { $ref: '#/components/schemas/PathRedirectPreview' }
        blocked_reasons:
          type: array
          items:
            type: string
            enum: [cycle, path_traversal, duplicate_path, lost_update, parent_not_directory]
    PathRedirectPreview:
      type: object
      required: [old_path, new_path, node_id]
      properties:
        old_path: { type: string }
        new_path: { type: string }
        node_id: { type: string, format: uuid }
    PathRedirect:
      type: object
      required: [id, old_path, new_path, node_id, created_at]
      properties:
        id: { type: string, format: uuid }
        old_path: { type: string }
        new_path: { type: string }
        node_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
    EmbeddingState:
      type: object
      required: [file_id, provider, model, dimensions, status]
      properties:
        file_id: { type: string, format: uuid }
        provider: { type: string, const: qwen }
        model: { type: string, const: text-embedding-v4 }
        dimensions: { type: integer, const: 1024 }
        status: { $ref: '#/components/schemas/EmbeddingStatus' }
        error: { type: [string, 'null'] }
        updated_at: { type: [string, 'null'], format: date-time }
  responses:
    BadRequest:
      description: Invalid request body or fields
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Role lacks permission
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflict, such as duplicate slug/email, lost update, revision conflict, or blocked publication
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalServerError:
      description: Unexpected server error with no internal implementation details
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example: { error: internal server error }
